<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/main.js"></script>
  </head>
  <body>
    <main class="panel">
      <header>
        <h1>图层快速跳转</h1>
        <p>CEP 离线实验版：保存三个常用图层位置。</p>
      </header>

      <section class="records">
        <article class="record">
          <div class="record-info">
            <span>记录 1</span>
            <strong id="recordName1">未保存</strong>
          </div>
          <div class="record-actions">
            <button id="save1" type="button">保存</button>
            <button id="jump1" type="button" disabled>跳转</button>
          </div>
        </article>

        <article class="record">
          <div class="record-info">
            <span>记录 2</span>
            <strong id="recordName2">未保存</strong>
          </div>
          <div class="record-actions">
            <button id="save2" type="button">保存</button>
            <button id="jump2" type="button" disabled>跳转</button>
          </div>
        </article>

        <article class="record">
          <div class="record-info">
            <span>记录 3</span>
            <strong id="recordName3">未保存</strong>
          </div>
          <div class="record-actions">
            <button id="save3" type="button">保存</button>
            <button id="jump3" type="button" disabled>跳转</button>
          </div>
        </article>
      </section>

      <p id="message" role="status">选中图层或图层组后保存记录点。</p>
    </main>
  </body>
</html>
