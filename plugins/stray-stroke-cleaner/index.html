<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/styles.css" />
    <script src="src/main.js"></script>
  </head>
  <body>
    <main class="panel">
      <header>
        <h1>Stray Stroke Cleaner</h1>
        <p>Review the current Photoshop document before cleanup.</p>
      </header>

      <section class="status">
        <dl>
          <div>
            <dt>Document</dt>
            <dd id="documentName">No active document</dd>
          </div>
          <div>
            <dt>Top-level layers</dt>
            <dd id="layerCount">-</dd>
          </div>
        </dl>
      </section>

      <section class="actions">
        <button id="refreshButton">Refresh</button>
        <button id="createReviewLayerButton">Create Review Layer</button>
      </section>

      <p id="message" role="status"></p>
    </main>
  </body>
</html>
